<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬心情小語</title>
    <style>
        /* 這裡控制網頁的外觀 */
        body { 
            background-color: #Fdfbf7; /* 溫柔的米白背景色 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; /* 讓卡片在畫面正中央 */
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
        }
        .card { 
            background: white; 
            border-radius: 20px; /* 圓角設計，像實體卡片一樣 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); /* 淡淡的陰影增加立體感 */
            padding: 50px 30px; 
            width: 80%; 
            max-width: 400px; 
            text-align: center; 
        }
        .quote { 
            font-size: 1.3rem; 
            color: #555; 
            line-height: 1.8; 
            margin-bottom: 30px; 
            min-height: 80px; /* 預留文字空間 */
        }
        .btn { 
            background-color: #E2C2B3; /* 溫暖的奶茶色按鈕 */
            border: none; 
            padding: 12px 25px; 
            border-radius: 30px; 
            color: white; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn:hover { 
            background-color: #D1AFA0; /* 滑鼠移過去會變深一點 */
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 這裡會顯示抽到的文字 -->
        <div class="quote" id="quote-text">正在為您抽取今天的專屬小語...</div>
        
        <!-- 手動再抽一張的按鈕 -->
        <button class="btn" onclick="drawCard()">再抽一張</button>
    </div>

    <script>
        /* 這裡是你的「彩虹卡語錄庫」，你可以隨意新增或修改引號裡面的字 */
        const cards =[
            "今天的你，已經做得很好了，請給自己一個大大的擁抱。",
            "允許自己有低落的時候，因為那是為了積蓄再次前進的能量。",
            "你的存在本身，就是一份美好的禮物。",
            "不要急，我們慢慢來。每朵花都有屬於自己的花期。",
            "把焦點放回自己身上，感受當下的呼吸，你是安全的。",
            "有時候，什麼都不做也是一種前進的方式。"
        ];

        /* 隨機抽卡的程式邏輯 */
        function drawCard() {
            // 從語錄庫中隨機挑選一個數字
            const randomIndex = Math.floor(Math.random() * cards.length);
            // 把挑選到的文字顯示在網頁上
            document.getElementById('quote-text').innerText = cards[randomIndex];
        }

        /* 設定網頁一打開，就自動執行抽卡動作 */
        window.onload = drawCard;
    </script>

</body>
</html>
